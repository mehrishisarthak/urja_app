[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed   = 115200
upload_speed    = 921600

; Feature flags for FirebaseClient — must be defined before the library
; headers are parsed, so build_flags is the correct place in PlatformIO.
build_flags =
    -DENABLE_USER_AUTH
    -DENABLE_FIRESTORE

lib_deps =
    mobizt/FirebaseClient
    miguelbalboa/MFRC522
