name: urja
description: "A cross-platform app for waste management and colony rewards."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.4.1
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  lottie: ^3.3.3
  shared_preferences: ^2.5.5
  smooth_page_indicator: ^2.0.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_logo.png"
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/icon/app_logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_logo.png"
  windows:
    generate: true
    image_path: "assets/icon/app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/coins.json
    - assets/lottie/colony.json
    - assets/lottie/recycle.json
    - assets/lottie/energy_bulb.json
    - assets/lottie/truck.json
    - assets/icon/google.png
    - assets/icon/app_logo.png